<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BI SmartBilling Agent</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #e7e7e7;
      color: #23384d;
    }

    body {
      min-height: 100vh;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Top header */
    .top-header {
      background: #efefef;
      padding: 22px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #d7d7d7;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: 1px;
      color: #506579;
    }

    .logo .accent {
      color: #f28c00;
    }

    .lang-switch {
      font-size: 14px;
      font-weight: 700;
      color: #1f4a73;
    }

    /* Navigation */
    .nav-bar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 220px 280px;
      min-height: 56px;
      background: #203a56;
      overflow: hidden;
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(180deg, #334e69 0%, #203a56 100%);
      border-right: 1px solid rgba(255,255,255,0.15);
    }

    .nav-item.search {
      gap: 8px;
    }

    .cta-orange {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #ffae00 0%, #ef8f00 100%);
      color: white;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      padding: 0 10px;
    }

    .cta-green {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #45c91b 0%, #2ea80e 100%);
      color: white;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      padding: 0 10px;
    }

    /* Hero section */
    .hero {
      position: relative;
      padding: 42px 24px 90px;
      min-height: 640px;
      overflow: hidden;
      background:
        radial-gradient(circle at 30px 30px, rgba(170,170,170,0.18) 0 18px, transparent 18px),
        radial-gradient(circle at 90px 90px, rgba(170,170,170,0.10) 0 18px, transparent 18px),
        linear-gradient(0deg, rgba(255,255,255,0.28), rgba(255,255,255,0.28)),
        #e7e7e7;
      background-size: 120px 120px, 120px 120px, auto, auto;
    }

    .hero-inner {
      max-width: 1280px;
      margin: 0 auto;
      position: relative;
      min-height: 520px;
    }

    /* Left circular visual */
    .circle-wrap {
      position: absolute;
      left: 70px;
      top: 60px;
      width: 420px;
      height: 420px;
    }

    .circle-accent {
      position: absolute;
      left: -36px;
      top: 145px;
      width: 112px;
      height: 112px;
      background: #f39a00;
      border-radius: 50%;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      z-index: 1;
    }

    .circle-image {
      position: absolute;
      width: 390px;
      height: 390px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid rgba(255,255,255,0.82);
      box-shadow: 0 12px 30px rgba(0,0,0,0.20);
      background: #7aa8d0;
      z-index: 2;
    }

    .circle-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Orange banner */
    .announcement {
      position: absolute;
      left: 420px;
      right: 36px;
      top: 320px;
      background: #f39a00;
      color: white;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    /* Floating contact icons */
    .floating-icons {
      position: fixed;
      right: 18px;
      top: 280px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 20;
    }

    .floating-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: white;
      border: 3px solid #284b72;
      color: #284b72;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }

    /* Keep convai tag hidden in layout but active */
    elevenlabs-convai {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 30;
    }

    /* Footer */
    .footer {
      background: #203a56;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 14px;
    }

    /* Tablet */
    @media (max-width: 1100px) {
      .nav-bar {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .cta-orange,
      .cta-green {
        display: none;
      }

      .hero {
        min-height: auto;
        padding-bottom: 60px;
      }

      .hero-inner {
        min-height: auto;
      }

      .circle-wrap,
      .announcement {
        position: relative;
        left: auto;
        right: auto;
        top: auto;
        width: auto;
        margin: 0 auto 24px;
      }

      .circle-wrap {
        width: 390px;
        height: 390px;
      }

      .announcement {
        max-width: 760px;
      }
    }

    /* Mobile */
    @media (max-width: 768px) {
      .top-header {
        padding: 18px 20px;
      }

      .logo {
        font-size: 18px;
      }

      .lang-switch {
        font-size: 13px;
      }

      .nav-bar {
        grid-template-columns: 1fr;
      }

      .nav-item,
      .cta-orange,
      .cta-green {
        min-height: 48px;
      }

      .hero {
        padding: 24px 16px 40px;
      }

      .circle-wrap {
        width: 280px;
        height: 280px;
      }

      .circle-image {
        width: 280px;
        height: 280px;
      }

      .circle-accent {
        width: 88px;
        height: 88px;
        left: -16px;
        top: 96px;
      }

      .announcement {
        font-size: 16px;
        padding: 14px 16px;
      }

      .floating-icons {
        display: none;
      }
    }
  </style>
</head>
<body>

  <header class="top-header">
    <div class="logo">
      <span class="accent">BI</span>NA<br />
      ISTRA
    </div>
    <div class="lang-switch">HR | EN</div>
  </header>

  <nav class="nav-bar">
    <div class="nav-item">CESTARINA</div>
    <div class="nav-item">Y ONLINE</div>
    <div class="nav-item search">TRAŽI 🔍</div>
    <div class="cta-orange">KONTAKT</div>
    <div class="cta-green">MOJ KORISNIČKI RAČUN</div>
  </nav>

  <section class="hero">
    <div class="hero-inner">

      <div class="circle-wrap">
        <div class="circle-accent"></div>
        <div class="circle-image">
          <img src="toll.jpg" alt="Toll road" />
        </div>
      </div>

      <div class="announcement">
        SmartBilling assistant for tolling, invoices and account support
      </div>

    </div>
  </section>

  <div class="floating-icons">
    <div class="floating-icon">📞</div>
    <div class="floating-icon">✉️</div>
    <div class="floating-icon">?</div>
  </div>

  <footer class="footer">
    © 2026 BI SmartBilling Demo | Powered by Conversational AI
  </footer>

  <!-- ElevenLabs agent kept active -->
  <elevenlabs-convai
    agent-id="agent_0301kshmfw32f8sat8f8ye1c8yaq"
    variant="compact"
    dismissible="true">
  </elevenlabs-convai>

  <script
    src="https://unpkg.com/@elevenlabs/convai-widget-embed"
    async
    type="text/javascript">
  </script>

</body>
</html>
